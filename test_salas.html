<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Configurador de Salas Dynamico</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <!-- Iconos Lucide (SVG) -->
    <style>
        :root {
            --primary: #e11d48;
            /* Red */
            --primary-dark: #be123c;
            --secondary: #7c3aed;
            /* Purple */
            --bg: #ffffff;
            --card-bg: #ffffff;
            --text: #1e293b;
            --text-dim: #64748b;
            --glass: #f8fafc;
            --border: #e2e8f0;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background-color: var(--bg);
            background-image:
                radial-gradient(circle at 10% 10%, rgba(225, 29, 72, 0.03) 0%, transparent 35%),
                radial-gradient(circle at 90% 90%, rgba(124, 58, 237, 0.03) 0%, transparent 35%);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 40px 0;
            overflow-y: auto;
        }

        .container {
            width: 90%;
            max-width: 800px;
            position: relative;
            z-index: 10;
        }

        .card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05);
            transition: all 0.3s ease;
        }

        h1 {
            font-size: 2.2rem;
            font-weight: 700;
            margin-bottom: 10px;
            color: var(--text);
        }

        h1 span {
            color: var(--primary);
        }

        .subtitle {
            color: var(--text-dim);
            margin-bottom: 30px;
            font-size: 1.1rem;
        }

        .progress-bar {
            height: 6px;
            background: var(--glass);
            border-radius: 10px;
            margin-bottom: 40px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(to right, var(--primary), var(--secondary));
            width: 0%;
            transition: width 0.4s ease;
        }

        .step {
            display: none;
            animation: fadeIn 0.5s ease;
        }

        .step.active {
            display: block;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .question {
            font-size: 1.4rem;
            font-weight: 600;
            margin-bottom: 25px;
        }

        /* Input Number Style */
        .input-group {
            margin-bottom: 30px;
        }

        input[type="number"] {
            width: 100%;
            padding: 15px;
            border-radius: 12px;
            border: 1px solid var(--border);
            background: var(--glass);
            font-size: 1.2rem;
            color: var(--text);
            outline: none;
            transition: border-color 0.2s;
        }

        input[type="number"]:focus {
            border-color: var(--primary);
        }

        /* Grid de Iconos */
        .icon-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 15px;
            margin-bottom: 25px;
        }

        .icon-card {
            background: var(--glass);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 20px;
            cursor: pointer;
            text-align: center;
            transition: all 0.2s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }

        .icon-card:hover {
            border-color: var(--primary);
            transform: translateY(-2px);
        }

        .icon-card.selected {
            background: rgba(225, 29, 72, 0.05);
            border-color: var(--primary);
            box-shadow: 0 4px 12px rgba(225, 29, 72, 0.1);
        }

        .icon-card svg {
            width: 32px;
            height: 32px;
            color: var(--text-dim);
            transition: color 0.2s;
        }

        .icon-card.selected svg {
            color: var(--primary);
        }

        .icon-card span {
            font-size: 0.9rem;
            font-weight: 600;
        }

        /* Enchufes Counter */
        .counter-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: var(--glass);
            padding: 15px 20px;
            border-radius: 12px;
            border: 1px solid var(--border);
            margin-bottom: 25px;
        }

        .counter-controls {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .btn-counter {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            border: 1px solid var(--border);
            background: white;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            font-weight: bold;
        }

        /* Textarea */
        textarea {
            width: 100%;
            background: var(--glass);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 15px;
            color: var(--text);
            min-height: 80px;
            resize: vertical;
            margin-top: 10px;
        }

        .button-group {
            display: flex;
            justify-content: space-between;
            margin-top: 40px;
        }

        button {
            padding: 12px 30px;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            text-transform: uppercase;
        }

        .btn-prev {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text);
        }

        .btn-next {
            background: var(--primary);
            border: none;
            color: white;
            box-shadow: 0 4px 10px rgba(225, 29, 72, 0.2);
        }

        .success-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--bg);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
            opacity: 0;
            visibility: hidden;
            transition: 0.5s;
        }

        .success-overlay.show {
            opacity: 1;
            visibility: visible;
        }

        .success-icon {
            width: 80px;
            height: 80px;
            background: var(--primary);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            font-size: 2.5rem;
            margin-bottom: 20px;
        }

        .spinner {
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            display: none;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .btn-next.loading span {
            display: none;
        }

        .btn-next.loading .spinner {
            display: inline-block;
        }
    </style>
</head>

<body>
    <div id="success-message" class="success-overlay">
        <div class="success-icon">✓</div>
        <h2>¡Informe Enviado!</h2>
        <p style="color: var(--text-dim); margin-top: 10px;">Los detalles de las salas han sido enviados correctamente.
        </p>
        <button class="btn-next" style="margin-top: 30px;" onclick="window.location.href='index.html'">VOLVER AL
            INICIO</button>
    </div>

    <div class="container">
        <div class="card">
            <header>
                <h1>Gestión de <span>Salas</span></h1>
                <p class="subtitle" id="step-title">Configuración de Inventario Físico</p>
                <div class="progress-bar">
                    <div class="progress-fill" id="progress-fill"></div>
                </div>
            </header>

            <main id="quiz-container">
                <!-- Paso 1: Número de Salas -->
                <div class="step active" data-step="1">
                    <div class="question">¿Cuántas salas deseas configurar?</div>
                    <div class="input-group">
                        <input type="number" id="num-salas" min="1" max="50" placeholder="Ej: 5"
                            oninput="validateNumSalas()">
                    </div>
                    <p style="font-size: 0.9rem; color: var(--text-dim);">Se generará una ficha técnica por cada sala
                        indicada.</p>
                </div>

                <!-- Pasos Dinámicos se inyectarán aquí -->
            </main>

            <footer class="button-group">
                <button id="btn-prev" class="btn-prev" onclick="changeStep(-1)"
                    style="visibility: hidden;">Anterior</button>
                <button id="btn-next" class="btn-next" onclick="handleNext()" disabled>
                    <span>SIGUIENTE</span>
                    <div class="spinner"></div>
                </button>
            </footer>
        </div>
    </div>

    <script>
        let currentStep = 1;
        let totalSalas = 0;
        let totalSteps = 1;
        const responses = {};
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzCttPgs1CQmNmQzhDkQJndJUWQTGPrNMwnhucH849hQYm6drip4m39Tfd2a0W2ugGM/exec";

        function validateNumSalas() {
            const val = document.getElementById('num-salas').value;
            document.getElementById('btn-next').disabled = val < 1;
        }

        function handleNext() {
            if (currentStep === 1) {
                totalSalas = parseInt(document.getElementById('num-salas').value);
                generateSteps();
                changeStep(1);
            } else if (currentStep === totalSteps) {
                sendToEmail();
            } else {
                changeStep(1);
            }
        }

        function generateSteps() {
            const container = document.getElementById('quiz-container');
            // Limpiar pasos anteriores excepto el 1
            const steps = container.querySelectorAll('.step');
            steps.forEach(s => { if (s.dataset.step != 1) s.remove(); });

            for (let i = 1; i <= totalSalas; i++) {
                const stepDiv = document.createElement('div');
                stepDiv.className = 'step';
                stepDiv.dataset.step = i + 1;
                stepDiv.innerHTML = `
                    <div class="question">Configuración de la Sala ${i}</div>
                    
                    <div class="input-group" style="margin-bottom: 20px;">
                        <label class="subtitle" style="margin-bottom: 8px; display: block;">Nombre o Ubicación de la sala:</label>
                        <input type="text" id="name-${i}" placeholder="Ej: Sala de Juntas, Planta 2 - Azul..." 
                            style="width: 100%; padding: 12px; border-radius: 10px; border: 1px solid var(--border); background: var(--glass); color: var(--text);"
                            oninput="updateRoomName(${i})">
                    </div>

                    <div class="icon-grid">
                        <div class="icon-card" onclick="toggleIcon(this, ${i}, 'proyector')">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 13L2 17h20l-3-4"/><rect x="5" y="7" width="14" height="6" rx="2"/></svg>
                            <span>Proyector</span>
                        </div>
                        <div class="icon-card" onclick="toggleIcon(this, ${i}, 'audio')">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 6c3.31 0 6 2.69 6 6s-2.69 6-6 6-6-2.69-6-6 2.69-6 6-6z"/><path d="M12 10c1.1 0 2 .9 2 2s-.9 2-2 2-2-.9-2-2 .9-2 2-2z"/></svg>
                            <span>Audio</span>
                        </div>
                        <div class="icon-card" onclick="toggleIcon(this, ${i}, 'hdmi')">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 7h16v10H4z"/><path d="M8 7V5"/><path d="M16 7V5"/><path d="M12 17v2"/></svg>
                            <span>HDMI</span>
                        </div>
                        <div class="icon-card" onclick="toggleIcon(this, ${i}, 'vga')">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="8" width="16" height="8" rx="2"/><circle cx="7" cy="12" r="1"/><circle cx="17" cy="12" r="1"/></svg>
                            <span>VGA</span>
                        </div>
                        <div class="icon-card" onclick="toggleIcon(this, ${i}, 'ethernet')">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="7" width="20" height="10" rx="2"/><path d="M6 7V5"/><path d="M10 7V5"/><path d="M14 7V5"/><path d="M18 7V5"/></svg>
                            <span>Internet (Cable)</span>
                        </div>
                        <div class="icon-card" onclick="toggleIcon(this, ${i}, 'wifi')">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12.55a11 11 0 0 1 14.08 0"/><path d="M1.42 9a16 16 0 0 1 21.16 0"/><path d="M8.53 16.11a6 6 0 0 1 6.95 0"/><line x1="12" y1="20" x2="12.01" y2="20"/></svg>
                            <span>WiFi</span>
                        </div>
                    </div>

                    <div class="counter-row">
                        <span>Puntos de Enchufe</span>
                        <div class="counter-controls">
                            <div class="btn-counter" onclick="updateCounter(${i}, -1)">-</div>
                            <span id="enchufes-${i}">0</span>
                            <div class="btn-counter" onclick="updateCounter(${i}, 1)">+</div>
                        </div>
                    </div>

                    <label class="subtitle">Otros servicios u observaciones:</label>
                    <textarea id="obs-${i}" placeholder="Ej: Pizarra blanca, cafetera, luz regulable..." oninput="updateRoomObs(${i})"></textarea>
                `;
                container.appendChild(stepDiv);
                responses[`sala_${i}`] = { name: "", proyector: false, audio: false, hdmi: false, vga: false, ethernet: false, wifi: false, enchufes: 0, obs: "" };
            }

            // Paso Final: Resumen
            const finalStep = document.createElement('div');
            finalStep.className = 'step';
            finalStep.dataset.step = totalSalas + 2;
            finalStep.innerHTML = `
                <div class="question">Resumen de Configuración</div>
                <div id="summary-content" style="line-height: 1.6; color: var(--text-dim);"></div>
                <div style="margin-top:20px; color: var(--primary); font-weight:600;">Todo listo para enviar el inventario.</div>
            `;
            container.appendChild(finalStep);

            totalSteps = totalSalas + 2;
        }

        function toggleIcon(el, salaIdx, key) {
            el.classList.toggle('selected');
            responses[`sala_${salaIdx}`][key] = el.classList.contains('selected');
        }

        function updateCounter(salaIdx, delta) {
            let count = responses[`sala_${salaIdx}`].enchufes;
            count = Math.max(0, count + delta);
            responses[`sala_${salaIdx}`].enchufes = count;
            document.getElementById(`enchufes-${salaIdx}`).innerText = count;
        }

        function updateRoomName(salaIdx) {
            responses[`sala_${salaIdx}`].name = document.getElementById(`name-${salaIdx}`).value;
        }

        function updateRoomObs(salaIdx) {
            responses[`sala_${salaIdx}`].obs = document.getElementById(`obs-${salaIdx}`).value;
        }

        function changeStep(n) {
            document.querySelector(`.step[data-step="${currentStep}"]`).classList.remove('active');
            currentStep += n;
            document.querySelector(`.step[data-step="${currentStep}"]`).classList.add('active');

            if (currentStep === totalSteps) renderSummary();
            updateUI();
        }

        function updateUI() {
            const progress = ((currentStep - 1) / (totalSteps - 1)) * 100;
            document.getElementById('progress-fill').style.width = `${progress}%`;
            document.getElementById('btn-prev').style.visibility = (currentStep === 1) ? 'hidden' : 'visible';

            const btnNext = document.getElementById('btn-next');
            const btnSpan = btnNext.querySelector('span');

            if (currentStep === totalSteps) {
                btnSpan.innerText = "ENVIAR INVENTARIO";
            } else {
                btnSpan.innerText = "SIGUIENTE";
                btnNext.disabled = false;
            }
        }

        function renderSummary() {
            const summary = document.getElementById('summary-content');
            let html = `<p>Has configurado un total de <strong>${totalSalas} salas</strong>.</p><br>`;
            for (let i = 1; i <= totalSalas; i++) {
                const s = responses[`sala_${i}`];
                const servs = [];
                if (s.proyector) servs.push("Proyector");
                if (s.audio) servs.push("Audio");
                if (s.hdmi) servs.push("HDMI");
                if (s.vga) servs.push("VGA");
                if (s.ethernet) servs.push("Cable");
                if (s.wifi) servs.push("WiFi");

                html += `<div style="margin-bottom:10px; border-bottom:1px solid #eee; padding-bottom:5px;">
                    <strong>${s.name || `Sala ${i}`}:</strong> ${servs.join(", ") || "Sin servicios"} | ⚡ ${s.enchufes}<br>
                    <small>Obs: ${s.obs || "-"}</small>
                </div>`;
            }
            summary.innerHTML = html;
        }

        function sendToEmail() {
            const btnNext = document.getElementById('btn-next');
            btnNext.classList.add('loading');
            btnNext.disabled = true;

            // Formatear datos para el script
            const dataToEmail = {
                token: "1312",
                tipo_de_test: "Configuración Física de Salas",
                total_salas: totalSalas
            };

            for (let i = 1; i <= totalSalas; i++) {
                const s = responses[`sala_${i}`];
                const key = s.name ? `Sala_${i}_(${s.name})` : `Sala_${i}`;
                dataToEmail[key] = `Sevicios: ${[s.proyector ? "Proyector" : "", s.audio ? "Audio" : "", s.hdmi ? "HDMI" : "", s.vga ? "VGA" : "", s.ethernet ? "Cable" : "", s.wifi ? "WiFi" : ""].filter(x => x).join(", ")} | Enchufes: ${s.enchufes} | Obs: ${s.obs}`;
            }

            fetch(SCRIPT_URL, {
                method: 'POST',
                mode: 'no-cors',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(dataToEmail)
            })
                .then(() => {
                    document.getElementById('success-message').classList.add('show');
                })
                .catch(() => {
                    alert("Error al enviar. Se descargará una copia.");
                    const blob = new Blob([JSON.stringify(dataToEmail, null, 2)], { type: 'text/plain' });
                    const url = window.URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url; a.download = 'fichas_salas.txt'; a.click();
                })
                .finally(() => {
                    btnNext.classList.remove('loading');
                    btnNext.disabled = false;
                });
        }
    </script>
</body>

</html>
